version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: db-ojt-postgres
    environment:
      POSTGRES_DB: task_management
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    networks:
      - db-ojt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d task_management"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-test:
    image: postgres:16
    container_name: db-ojt-postgres-test
    environment:
      POSTGRES_DB: task_management_test
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - db-ojt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d task_management_test"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  postgres_test_data:

networks:
  db-ojt-network:
    driver: bridge